app:
  image:
    repository: ghcr.io/sbomvert/sbomvert
    tag: latest
    pullPolicy: IfNotPresent
  port: 3000
  env:
    NODE_ENV: production
    REDIS_HOST: redis
    ARTIFACT_BACKEND_TYPE: s3
    S3_ENDPOINT: http://minio:9000
    S3_ACCESS_KEY_ID: minioadmin
    S3_SECRET_ACCESS_KEY: minioadmin
    SBOM_S3_BUCKET: sbom
    CVE_S3_BUCKET: cve

redis:
  image:
    repository: redis
    tag: 7-alpine
    pullPolicy: IfNotPresent
  port: 6379
  persistence:
    enabled: true
    size: 1Gi

minio:
  image:
    repository: minio/minio
    tag: latest
    pullPolicy: IfNotPresent
  port: 9000
  consolePort: 9001
  rootUser: minioadmin
  rootPassword: minioadmin
  defaultBuckets: sbom,cve
  persistence:
    enabled: true
    size: 10Gi
